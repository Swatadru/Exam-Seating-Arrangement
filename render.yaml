services:
  - type: web
    name: exam-hall-app
    env: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    healthCheckPath: /index.php
    envVars:
      - key: IS_CLOUD
        value: "true"
      - key: RENDER
        value: "true"
    disk:
      name: sqlite-data
      mountPath: /var/www/html/data
      sizeGB: 1
