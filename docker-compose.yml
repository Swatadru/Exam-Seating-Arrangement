version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=exam_hall
    depends_on:
      - db
    volumes:
      - .:/var/www/html/

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=exam_hall
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./DB/exam_hall.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
